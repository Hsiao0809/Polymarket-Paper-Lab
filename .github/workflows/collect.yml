name: Collect Polymarket data

# Runs during US market hours (UTC 13:30-20:00), Mon-Fri, every 10 minutes.
# This file MUST live at the repo root under .github/workflows/ to take effect.
on:
  schedule:
    - cron: "*/10 13-20 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r polymarket-paper-lab/stage0/requirements.txt

      - name: Collect one snapshot
        working-directory: polymarket-paper-lab/stage0
        run: python cloud_collect.py --out ../../data/snapshots.jsonl

      - name: Commit data
        run: |
          git config user.name  "collector-bot"
          git config user.email "collector-bot@users.noreply.github.com"
          git add data/snapshots.jsonl
          if git diff --staged --quiet; then
            echo "No new data, skipping commit"
            exit 0
          fi
          git commit -m "data: $(date -u '+%Y-%m-%d %H:%M')Z"
          for i in 1 2 3; do
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" && \
            git push origin "HEAD:${GITHUB_REF_NAME}" && exit 0
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
          echo "::error::Push failed after 3 attempts"
          exit 1
